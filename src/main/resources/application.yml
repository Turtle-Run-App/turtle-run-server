server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/game
    username: game
    password: game
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true