server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/turtle-run-app-db
    username: turtle-run-app-db
    password: turtle-run-app-db
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true